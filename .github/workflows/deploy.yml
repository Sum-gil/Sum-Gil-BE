name: Deploy Sumgil Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/sumgil-be:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/sumgil-be:latest

      - name: Create SSH dir
        shell: bash
        run: |
          mkdir -pv "$HOME/.ssh"
          ls -ld "$HOME/.ssh"

      - name: Write private key
        shell: bash
        run: |
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > "$HOME/.ssh/private_key.pem"
          chmod 600 "$HOME/.ssh/private_key.pem"
          ssh-keygen -y -f "$HOME/.ssh/private_key.pem" > /dev/null

      - name: Add known_hosts
        shell: bash
        run: |
          ssh-keyscan -p "${{ secrets.EC2_PORT }}" "${{ secrets.EC2_HOST }}" >> "$HOME/.ssh/known_hosts"

      - name: Deploy to EC2
        shell: bash
        run: |
          ssh -i "$HOME/.ssh/private_key.pem" -p "${{ secrets.EC2_PORT }}" "${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}" << 'EOF'
            set -e
            cd /home/ubuntu
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sumgil-be:latest
            docker compose down
            docker compose up -d
            docker image prune -af
          EOF